name: college_erp
description: College ERP System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  http: ^1.1.0
  dio: ^5.3.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # File Picker (for CSV upload)
  file_picker: ^6.1.1
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0
  
  # 🆕 CHARTS & ANALYTICS
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.2.7
  
  # 🆕 PDF GENERATION
  pdf: ^3.10.6
  printing: ^5.12.0
  path_provider: ^2.1.1
  
  # 🆕 DATE FORMATTING
  intl: ^0.19.0
  
  # 🆕 FILE HANDLING
  open_file: ^3.3.2
  file_saver: ^0.2.2+1
  
  # 🆕 UTILITIES
  uuid: ^4.2.1
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700